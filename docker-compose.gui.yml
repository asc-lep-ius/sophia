services:
  sophia-gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
      args:
        VARIANT: ${SOPHIA_VARIANT:-gpu}
    image: ${SOPHIA_GUI_IMAGE:-sophia-gui:latest}
    ports:
      - "${SOPHIA_GUI_PORT:-8080}:8080"
    volumes:
      - sophia-data:/data
      - ${SOPHIA_CONFIG_DIR:-~/.config/sophia}:/config
    environment:
      - SOPHIA_GUI_HOST=0.0.0.0
      - SOPHIA_GUI_PORT=8080
      - SOPHIA_DATA_DIR=/data
      - SOPHIA_CONFIG_DIR=/config
      - SOPHIA_LOG_FORMAT=json
      - SOPHIA_DOCKER=1
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sophia-data:
