services:
  sophia-gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    ports:
      - "${SOPHIA_GUI_PORT:-8080}:8080"
    volumes:
      - sophia-data:/data
      - ${SOPHIA_CONFIG_DIR:-~/.config/sophia}:/config:ro
    environment:
      - SOPHIA_GUI_HOST=0.0.0.0
      - SOPHIA_GUI_PORT=8080
      - SOPHIA_DATA_DIR=/data
      - SOPHIA_CONFIG_DIR=/config
      - SOPHIA_LOG_FORMAT=json
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sophia-data:
