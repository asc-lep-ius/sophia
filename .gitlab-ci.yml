stages:
  - check
  - build

variables:
  UV_CACHE_DIR: .uv-cache

.python-job:
  image: python:${PYTHON_VERSION}-slim
  tags: [ubuntu-desktop-1]
  before_script:
    - pip install uv
    - uv sync --extra web --extra test --group dev
  cache:
    key:
      prefix: uv-${PYTHON_VERSION}
      files:
        - uv.lock
    paths:
      - .uv-cache/

lint:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run ruff check .
    - uv run ruff format --check .

typecheck:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libatomic1
    - pip install uv
    - uv sync --extra web --extra test --group dev
  script:
    - uv run pyright

test:
  extends: .python-job
  stage: check
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.12", "3.14"]
  script:
    - uv run pytest --ignore=tests/integration --tb=short -q --cov=src/sophia --cov-report=term-missing --cov-report=xml --cov-fail-under=70
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 30 days

security:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run pip-audit
  allow_failure: true

docker-build:
  stage: build
  image: docker:latest
  tags: [ubuntu-desktop-1]
  # Uses host Docker socket (mounted via runner config) instead of DinD.
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        docker push $CI_REGISTRY_IMAGE:latest
        echo "Published $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - changes:
        - Dockerfile
        - docker-compose.yml
        - pyproject.toml
        - uv.lock

test-gui:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run pytest tests/unit/gui/ -v --tb=short

test-gui-e2e:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  allow_failure: true
  script:
    - uv run playwright install --with-deps chromium
    # Exclude smoke tests that start their own NiceGUI server — they can't share
    # the session-scoped gui_base_url and must run in isolated jobs below.
    - >-
      uv run pytest tests/integration/gui/
      --ignore=tests/integration/gui/test_smoke_hermes_wizard.py
      --ignore=tests/integration/gui/test_smoke_tier2.py
      -m e2e -v --tb=short

test-gui-smoke-tier2:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run playwright install --with-deps chromium
    - uv run pytest tests/integration/gui/test_smoke_tier2.py -m e2e -v --tb=short

test-gui-smoke-hermes:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  timeout: 10 minutes
  before_script:
    - pip install uv
    - uv sync --extra web --extra test --group dev
    # CPU-only torch (~200MB) instead of CUDA torch (~3GB) — matches Dockerfile.gui cpu-builder
    - uv pip install torch --index-url https://download.pytorch.org/whl/cpu
    - uv pip install faster-whisper chromadb sentence-transformers openai
  script:
    - uv run playwright install --with-deps chromium
    - uv run pytest tests/integration/gui/test_smoke_hermes_wizard.py -m e2e -v --tb=short

test-gui-a11y:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  allow_failure: true
  script:
    - uv run playwright install --with-deps chromium
    - uv run pytest tests/integration/gui/test_accessibility.py -m e2e -v --tb=short

.docker-gui-build:
  stage: build
  image: docker:latest
  tags: [ubuntu-desktop-1]
  # Uses host Docker socket (mounted via runner config) instead of DinD.
  # This reuses the host layer cache so CUDA layers are never re-downloaded.
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - changes:
        - Dockerfile.gui
        - Dockerfile.gui.base
        - docker-compose.gui.yml
        - pyproject.toml
        - uv.lock

docker-gui-base-build:
  extends: .docker-gui-build
  timeout: 120m
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
      allow_failure: true
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -f Dockerfile.gui.base
      -t $CI_REGISTRY_IMAGE/gui-base:latest .
    - docker push $CI_REGISTRY_IMAGE/gui-base:latest

docker-gui-build:
  extends: .docker-gui-build
  timeout: 30m
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build
      --target runtime
      --build-arg GPU_BASE_IMAGE=$CI_REGISTRY_IMAGE/gui-base:latest
      -f Dockerfile.gui
      -t $CI_REGISTRY_IMAGE/gui:$CI_COMMIT_SHORT_SHA
      -t $CI_REGISTRY_IMAGE/gui:latest .
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker push $CI_REGISTRY_IMAGE/gui:$CI_COMMIT_SHORT_SHA
        docker push $CI_REGISTRY_IMAGE/gui:latest
        echo "Published $CI_REGISTRY_IMAGE/gui:$CI_COMMIT_SHORT_SHA"
      fi

docker-gui-build-cpu:
  extends: .docker-gui-build
  timeout: 20m
  script:
    - docker build --target runtime-cpu -f Dockerfile.gui
      -t $CI_REGISTRY_IMAGE/gui:cpu-$CI_COMMIT_SHORT_SHA
      -t $CI_REGISTRY_IMAGE/gui:cpu .
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker push $CI_REGISTRY_IMAGE/gui:cpu-$CI_COMMIT_SHORT_SHA
        docker push $CI_REGISTRY_IMAGE/gui:cpu
        echo "Published $CI_REGISTRY_IMAGE/gui:cpu-$CI_COMMIT_SHORT_SHA"
      fi
