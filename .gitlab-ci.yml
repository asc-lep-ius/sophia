stages:
  - check
  - build

variables:
  UV_CACHE_DIR: .uv-cache

.python-job:
  image: python:${PYTHON_VERSION}-slim
  tags: [ubuntu-desktop-1]
  before_script:
    - pip install uv
    - uv sync --extra web --extra test --group dev
  cache:
    key:
      prefix: uv-${PYTHON_VERSION}
      files:
        - uv.lock
    paths:
      - .uv-cache/

lint:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run ruff check .
    - uv run ruff format --check .

typecheck:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libatomic1
    - pip install uv
    - uv sync --extra web --extra test --group dev
  script:
    - uv run pyright

test:
  extends: .python-job
  stage: check
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.12", "3.14"]
  script:
    - uv run pytest --ignore=tests/integration --tb=short -q --cov=src/sophia --cov-report=term-missing --cov-report=xml --cov-fail-under=70
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 30 days

security:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run pip-audit
  allow_failure: true

docker-build:
  stage: build
  image: docker:latest
  tags: [ubuntu-desktop-1]
  services:
    - docker:dind
  variables:
    # Disable TLS so dind listens on 2375 and the client can reach it
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        docker push $CI_REGISTRY_IMAGE:latest
        echo "Published $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - changes:
        - Dockerfile
        - docker-compose.yml
        - pyproject.toml
        - uv.lock

test-gui:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run pytest tests/unit/gui/ -v --tb=short

test-gui-e2e:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  allow_failure: true
  script:
    - uv run playwright install --with-deps chromium
    - uv run pytest tests/integration/gui/ -v --tb=short

test-gui-a11y:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  allow_failure: true
  script:
    - uv run playwright install --with-deps chromium
    - uv run pytest tests/integration/gui/ -k accessibility -v --tb=short

docker-gui-build:
  stage: build
  image: docker:latest
  tags: [ubuntu-desktop-1]
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  script:
    - docker build -f Dockerfile.gui -t sophia-gui:latest .
    - |
      IMAGE_SIZE=$(docker image inspect sophia-gui:latest --format='{{.Size}}')
      MAX_SIZE=$((500 * 1024 * 1024))
      echo "Image size: $((IMAGE_SIZE / 1024 / 1024))MB"
      if [ "$IMAGE_SIZE" -gt "$MAX_SIZE" ]; then
        echo "ERROR: Image exceeds 500MB limit"
        exit 1
      fi
  rules:
    - changes:
        - Dockerfile.gui
        - docker-compose.gui.yml
        - pyproject.toml
        - uv.lock
