# Sophia CI — local GitLab runners + registry
# Replace .gitlab-ci.yml in the sophia repo after migration
#
# Changes from gitlab.com version:
#   - Registry: gitlab.hephaestus:5050 (localhost, ~60s push vs 75min)
#   - Tags: hephaestus (build/test), workstation (training)
#   - Removed push_with_retry (no longer needed)
#   - GPU build timeout: 2h → 30m
#   - Added training smoke test on workstation runner
#   - All CUDA images pinned to 13.0+ (RTX 5070 Ti compatibility)
#   - Kaniko OOM fix: --compressed-caching=false + --use-new-run

variables:
  LOCAL_REGISTRY: "gitlab.hephaestus:5050/mipkovich/sophia"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

stages:
  - rebuild-ci
  - check
  - build
  - train

# --- CI image rebuild ---
.ci-rebuild-rules:
  rules:
    - changes:
        - ci/Dockerfile.ci
        - pyproject.toml
        - uv.lock

rebuild-ci-image:
  stage: rebuild-ci
  tags: [hephaestus, build]
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  extends: .ci-rebuild-rules
  script:
    - CI_HASH=$(cat ci/Dockerfile.ci pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}"
        --dockerfile "${CI_PROJECT_DIR}/ci/Dockerfile.ci"
        --destination "${LOCAL_REGISTRY}/ci:${CI_HASH}"
        --cache=true
        --cache-repo="${LOCAL_REGISTRY}/ci-cache"
        --insecure-registry=gitlab.hephaestus:5050
        --snapshot-mode=redo
        --compressed-caching=false
        --use-new-run

# --- Check stage ---
lint:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv run ruff check src/ tests/
    - uv run ruff format --check src/ tests/

typecheck:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends libatomic1
  script:
    - uv sync --extra web
    - uv run pyright src/

test:3.12:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv sync --extra web --extra test
    - uv run pytest tests/ -x --tb=short --cov=sophia --cov-report=term
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)/'

test:3.14:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  script:
    - uv sync --extra web --extra test
    - uv run pytest tests/ -x --tb=short
  allow_failure: true

# --- Build stage ---
docker-gui-build-gpu:
  stage: build
  tags: [hephaestus, build]
  timeout: 1h
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - GPU_HASH=$(cat Dockerfile.gui.cuda pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}"
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile.gui.cuda"
        --destination "${LOCAL_REGISTRY}/gui-cuda:${GPU_HASH}"
        --destination "${LOCAL_REGISTRY}/gui-cuda:latest"
        --cache=true
        --cache-repo="${LOCAL_REGISTRY}/gui-cuda-cache"
        --insecure-registry=gitlab.hephaestus:5050
        --snapshot-mode=redo
        --compressed-caching=false
        --use-new-run
  rules:
    - changes:
        - Dockerfile.gui.cuda
        - pyproject.toml
        - uv.lock
        - src/**/*

# --- Training (on workstation) ---
train-smoke:
  stage: train
  tags: [workstation, gpu-train]
  resource_group: gpu
  image: "${LOCAL_REGISTRY}/gui-cuda:latest"
  timeout: 30m
  script:
    - nvidia-smi
    - python -c "import torch; assert torch.cuda.is_available(); print(torch.cuda.get_device_name(0))"
    - echo "Training smoke test placeholder — add actual training command"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
