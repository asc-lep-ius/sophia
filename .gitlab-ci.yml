# Sophia CI — local GitLab runners + registry
#
# Docker builds use BuildKit (docker buildx) via DinD on the privileged runner.
# Registry: gitlab.hephaestus:5050 (HTTP, insecure).
# Tags: hephaestus (check/build), workstation (training).

variables:
  LOCAL_REGISTRY: "gitlab.hephaestus:5050/mipkovich/sophia"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

stages:
  - rebuild-ci
  - check
  - build
  - train

# --- Docker build template (BuildKit + DinD) ---
.docker-build:
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--insecure-registry=gitlab.hephaestus:5050"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      cat > /tmp/buildkitd.toml << EOF
      [registry."gitlab.hephaestus:5050"]
        http = true
      EOF
    - docker buildx create --use --name ci-builder
        --driver docker-container
        --driver-opt network=host
        --config /tmp/buildkitd.toml
    - docker buildx inspect --bootstrap
  after_script:
    - docker buildx rm ci-builder 2>/dev/null || true
  tags: [hephaestus, build]

# --- CI image rebuild ---
.ci-rebuild-rules:
  rules:
    - changes:
        - ci/Dockerfile.ci
        - pyproject.toml
        - uv.lock

rebuild-ci-image:
  stage: rebuild-ci
  extends:
    - .docker-build
    - .ci-rebuild-rules
  script:
    - CI_HASH=$(cat ci/Dockerfile.ci pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - docker buildx build
        --file ci/Dockerfile.ci
        --cache-from type=registry,ref=${LOCAL_REGISTRY}/ci-cache
        --cache-to type=registry,ref=${LOCAL_REGISTRY}/ci-cache,mode=max
        --tag ${LOCAL_REGISTRY}/ci:${CI_HASH}
        --push .

# --- Check stage ---
lint:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv run ruff check src/ tests/
    - uv run ruff format --check src/ tests/

typecheck:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends libatomic1
  script:
    - uv sync --extra web
    - uv run pyright src/

test:3.12:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv sync --extra web --extra test
    - uv run pytest tests/ -x --tb=short --cov=sophia --cov-report=term
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)/'

test:3.14:
  stage: check
  tags: [hephaestus]
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  script:
    - uv sync --extra web --extra test
    - uv run pytest tests/ -x --tb=short
  allow_failure: true

# --- Build stage ---
docker-gui-build-gpu:
  stage: build
  extends: .docker-build
  timeout: 1h
  script:
    - GPU_HASH=$(cat Dockerfile.gui.cuda pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - docker buildx build
        --file Dockerfile.gui.cuda
        --cache-from type=registry,ref=${LOCAL_REGISTRY}/gui-cuda-cache
        --cache-to type=registry,ref=${LOCAL_REGISTRY}/gui-cuda-cache,mode=max
        --tag ${LOCAL_REGISTRY}/gui-cuda:${GPU_HASH}
        --tag ${LOCAL_REGISTRY}/gui-cuda:latest
        --push .
  rules:
    - changes:
        - Dockerfile.gui.cuda
        - pyproject.toml
        - uv.lock
        - src/**/*

# --- Training (on workstation) ---
train-smoke:
  stage: train
  tags: [workstation, gpu-train]
  resource_group: gpu
  image: "${LOCAL_REGISTRY}/gui-cuda:latest"
  timeout: 30m
  script:
    - nvidia-smi
    - python -c "import torch; assert torch.cuda.is_available(); print(torch.cuda.get_device_name(0))"
    - echo "Training smoke test placeholder — add actual training command"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
