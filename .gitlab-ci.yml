stages:
  - rebuild-ci
  - check
  - build

# ── Helpers ─────────────────────────────────────────────────────────────────

.docker-push-with-retry: &docker-push-with-retry |
  push_with_retry() {
    local image="$1" attempt=0 max_attempts=3 delay=5
    while [ "$attempt" -lt "$max_attempts" ]; do
      attempt=$((attempt + 1))
      echo "[push] attempt $attempt/$max_attempts — $image"
      if docker push "$image"; then return 0; fi
      [ "$attempt" -lt "$max_attempts" ] && sleep "$delay"
    done
    echo "[push] FAILED after $max_attempts attempts" >&2
    return 1
  }

# ── CI image rebuild (pull-or-build) ───────────────────────────────────────

rebuild-ci:
  stage: rebuild-ci
  image: docker:27
  tags: [ubuntu-desktop-1]
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  artifacts:
    reports:
      dotenv: build.env
  script:
    - *docker-push-with-retry
    - TAG=$(cat ci/Dockerfile.ci pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - IMAGE="$CI_REGISTRY_IMAGE/ci:${TAG}"
    - echo "CI_IMAGE=${IMAGE}" > build.env
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      if docker pull "$IMAGE" 2>/dev/null; then
        echo "Image $IMAGE already exists — skipping build"
      else
        echo "Image not found — building $IMAGE"
        docker pull "$CI_REGISTRY_IMAGE/ci:latest" 2>/dev/null || true
        docker build \
          --cache-from "$CI_REGISTRY_IMAGE/ci:latest" \
          -t "$IMAGE" \
          -t "$CI_REGISTRY_IMAGE/ci:latest" \
          -f ci/Dockerfile.ci .
        push_with_retry "$IMAGE"
        push_with_retry "$CI_REGISTRY_IMAGE/ci:latest"
      fi

# ── Base jobs ───────────────────────────────────────────────────────────────

.ci-job:
  image: $CI_IMAGE
  tags: [ubuntu-desktop-1]
  needs:
    - job: rebuild-ci
      artifacts: true
  before_script:
    - ln -s /app/.venv .venv
    - uv pip install --python .venv/bin/python -e . --no-deps

# Fallback for Python versions without a pre-built CI image (e.g. 3.14)
.python-job:
  image: python:${PYTHON_VERSION}-slim
  tags: [ubuntu-desktop-1]
  variables:
    UV_CACHE_DIR: .uv-cache
  before_script:
    - pip install uv
    - uv sync --extra web --extra test --group dev
  cache:
    key:
      prefix: uv-${PYTHON_VERSION}
      files:
        - uv.lock
    paths:
      - .uv-cache/

# ── Check stage ─────────────────────────────────────────────────────────────

lint:
  extends: .ci-job
  stage: check
  script:
    - uv run --no-sync ruff check .
    - uv run --no-sync ruff format --check .

typecheck:
  extends: .ci-job
  stage: check
  script:
    - uv run --no-sync pyright

test:3.12:
  extends: .ci-job
  stage: check
  script:
    - uv run --no-sync pytest --ignore=tests/integration --tb=short -q
      --cov=src/sophia --cov-report=term-missing --cov-report=xml --cov-fail-under=70
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 30 days

test:3.14:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.14"
  script:
    - uv run pytest --ignore=tests/integration --tb=short -q
      --cov=src/sophia --cov-report=term-missing --cov-report=xml --cov-fail-under=70
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 30 days

security:
  extends: .ci-job
  stage: check
  script:
    - uv run --no-sync pip-audit
  allow_failure: true

test-gui:
  extends: .ci-job
  stage: check
  script:
    - uv run --no-sync pytest tests/unit/gui/ -v --tb=short

test-gui-e2e:
  extends: .ci-job
  stage: check
  allow_failure: true
  script:
    # Playwright chromium is pre-installed in the CI image
    - >-
      uv run --no-sync pytest tests/integration/gui/
      --ignore=tests/integration/gui/test_smoke_hermes_wizard.py
      --ignore=tests/integration/gui/test_smoke_tier2.py
      -m e2e -v --tb=short

test-gui-smoke-tier2:
  extends: .ci-job
  stage: check
  script:
    - uv run --no-sync pytest tests/integration/gui/test_smoke_tier2.py -m e2e -v --tb=short

test-gui-smoke-hermes:
  extends: .ci-job
  stage: check
  timeout: 15 minutes
  before_script:
    - ln -s /app/.venv .venv
    - uv pip install --python .venv/bin/python -e . --no-deps
    # CPU-only torch (~200MB) instead of CUDA torch (~3GB)
    - uv pip install --python .venv/bin/python torch --index-url https://download.pytorch.org/whl/cpu
    - uv pip install --python .venv/bin/python faster-whisper chromadb sentence-transformers openai
  script:
    - uv run --no-sync pytest tests/integration/gui/test_smoke_hermes_wizard.py -m e2e -v --tb=short

test-gui-a11y:
  extends: .ci-job
  stage: check
  allow_failure: true
  script:
    - uv run --no-sync pytest tests/integration/gui/test_accessibility.py -m e2e -v --tb=short

# ── Build stage (content-addressed pull-or-build) ──────────────────────────
# Each image is tagged with sha256(inputs)[0:16]. If that tag exists in the
# registry, the push is skipped entirely — no multi-GB upload on every commit.

.docker-build-base:
  stage: build
  image: docker:27
  tags: [ubuntu-desktop-1]
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - changes:
        compare_to: refs/heads/master
        paths:
          - Dockerfile
          - Dockerfile.gui
          - Dockerfile.gui.cuda
          - docker-compose.yml
          - pyproject.toml
          - uv.lock

docker-build:
  extends: .docker-build-base
  timeout: 30m
  script:
    - *docker-push-with-retry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - TAG=$(cat Dockerfile pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - IMAGE="$CI_REGISTRY_IMAGE:${TAG}"
    - |
      if docker pull "$IMAGE" 2>/dev/null; then
        echo "Image $IMAGE already exists — skipping build/push"
      else
        echo "Image not found — building $IMAGE"
        docker pull "$CI_REGISTRY_IMAGE:latest" 2>/dev/null || true
        docker build --cache-from "$CI_REGISTRY_IMAGE:latest"
          -t "$IMAGE" -t "$CI_REGISTRY_IMAGE:latest" .
        push_with_retry "$IMAGE"
        push_with_retry "$CI_REGISTRY_IMAGE:latest"
        echo "Published $IMAGE"
      fi

docker-gui-build:
  extends: .docker-build-base
  timeout: 30m
  script:
    - *docker-push-with-retry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - TAG=$(cat Dockerfile.gui pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - IMAGE="$CI_REGISTRY_IMAGE/gui:${TAG}"
    - |
      if docker pull "$IMAGE" 2>/dev/null; then
        echo "Image $IMAGE already exists — skipping build/push"
      else
        echo "Image not found — building $IMAGE"
        docker pull "$CI_REGISTRY_IMAGE/gui:latest" 2>/dev/null || true
        docker build --cache-from "$CI_REGISTRY_IMAGE/gui:latest"
          -f Dockerfile.gui -t "$IMAGE" -t "$CI_REGISTRY_IMAGE/gui:latest" .
        push_with_retry "$IMAGE"
        push_with_retry "$CI_REGISTRY_IMAGE/gui:latest"
        echo "Published $IMAGE"
      fi

docker-gui-build-gpu:
  extends: .docker-build-base
  timeout: 2h
  script:
    - *docker-push-with-retry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - TAG=$(cat Dockerfile.gui.cuda ci/Dockerfile.cuda-base pyproject.toml uv.lock | sha256sum | cut -c1-16)
    - IMAGE="$CI_REGISTRY_IMAGE/gui:cuda-${TAG}"
    - |
      if docker pull "$IMAGE" 2>/dev/null; then
        echo "Image $IMAGE already exists — skipping build/push"
      else
        echo "Image not found — building $IMAGE"
        docker pull "$CI_REGISTRY_IMAGE/gui:cuda" 2>/dev/null || true
        docker build --cache-from "$CI_REGISTRY_IMAGE/gui:cuda"
          -f Dockerfile.gui.cuda
          --build-arg CUDA_BASE_IMAGE=$CI_REGISTRY_IMAGE/cuda-base:v1
          -t "$IMAGE" -t "$CI_REGISTRY_IMAGE/gui:cuda" .
        push_with_retry "$IMAGE"
        push_with_retry "$CI_REGISTRY_IMAGE/gui:cuda"
        echo "Published $IMAGE"
      fi

# Rebuild the CUDA base image when ML deps (torch, transformers, etc.) change.
# Triggered manually — run from master after updating pyproject.toml / uv.lock.
docker-cuda-base:
  stage: build
  image: docker:27
  tags: [ubuntu-desktop-1]
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  rules:
    - when: manual
      allow_failure: true
  timeout: 1h
  script:
    - *docker-push-with-retry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -f ci/Dockerfile.cuda-base
      -t "$CI_REGISTRY_IMAGE/cuda-base:v1" .
    - push_with_retry "$CI_REGISTRY_IMAGE/cuda-base:v1"
