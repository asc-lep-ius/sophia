stages:
  - check
  - build

variables:
  UV_CACHE_DIR: .uv-cache

.python-job:
  image: python:${PYTHON_VERSION}-slim
  tags: [ubuntu-desktop-1]
  before_script:
    - pip install uv
    - uv sync --group dev
  cache:
    key:
      prefix: uv-${PYTHON_VERSION}
      files:
        - uv.lock
    paths:
      - .uv-cache/

lint:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run ruff check .
    - uv run ruff format --check .

typecheck:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libatomic1
    - pip install uv
    - uv sync --group dev
  script:
    - uv run pyright

test:
  extends: .python-job
  stage: check
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.12", "3.14"]
  script:
    - uv run pytest --tb=short -q --cov=src/sophia --cov-report=term-missing --cov-report=xml --cov-fail-under=75
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 30 days

security:
  extends: .python-job
  stage: check
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run pip-audit
  allow_failure: true

docker-build:
  stage: build
  image: docker:latest
  tags: [ubuntu-desktop-1]
  services:
    - docker:dind
  script:
    - docker compose build
  rules:
    - changes:
        - Dockerfile
        - docker-compose.yml
        - pyproject.toml
