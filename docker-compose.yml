services:
  sophia:
    build: .
    env_file: .env
    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - SOPHIA_DATA_DIR=/data
    volumes:
      - sophia-data:/data
      - ./downloads:/app/downloads
    stdin_open: true
    tty: true
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import sqlite3; sqlite3.connect('/data/sophia.db').execute('SELECT 1')"]
      interval: 30s
      retries: 3

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    profiles: [scraping]
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 10s
      retries: 3
      start_period: 15s

volumes:
  sophia-data:
